<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domae Auto Thermal Welding Scrap Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        body { background-color: #fcfbf8; color: #334155; font-family: sans-serif; }
        /* ปรับ Container ให้รองรับการยืดตัวและ Scroll */
        .chart-container { position: relative; width: 100%; min-height: 400px; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .bg-schneider { background-color: #3dcd58; }
        .btn-active { background-color: #2e9d44 !important; color: white !important; transform: scale(1.05); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .hide { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 1rem; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: white; font-weight: bold; z-index: 3000; transition: all 0.3s; }
        select { background-image: none; appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="p-0 m-0 overflow-x-hidden text-[11px]">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#3dcd58] mx-auto"></div>
            <p class="mt-2 font-bold text-slate-500 italic text-xs">ใจเย็นๆ รอแปปนึงนะ...</p>
        </div>
    </div>
    
    <div id="toast" class="toast hide"></div>

    <!-- Header -->
    <header class="bg-schneider text-white p-3 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="text-center lg:text-left">
                <h1 class="text-base font-black uppercase tracking-tighter">Domae Auto Thermal Welding Scrap Tracking</h1>
                <p id="shift-label" class="text-white/90 text-[9px] italic font-medium">ตรวจสอบข้อมูลกะทำงาน...</p>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-2">
                <div class="flex bg-black/10 p-1 rounded-lg">
                    <button id="btn-current" onclick="setFilterMode('current')" class="px-2 py-1 rounded-md transition-all btn-active font-bold uppercase text-[9px]">Shift</button>
                    <button id="btn-previous" onclick="setFilterMode('previous')" class="px-2 py-1 rounded-md transition-all font-bold uppercase text-[9px]">Prev</button>
                </div>

                <div class="flex items-center bg-white/10 p-1 rounded-lg border border-white/20 gap-1">
                    <select id="sel-month" onchange="setFilterMode('month')" class="bg-emerald-900/40 text-white border-none rounded px-2 py-1 text-[9px] font-bold outline-none cursor-pointer">
                        <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option>
                        <option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option>
                        <option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                    </select>
                    <select id="sel-year" onchange="setFilterMode('year')" class="bg-emerald-900/40 text-white border-none rounded px-2 py-1 text-[9px] font-bold outline-none cursor-pointer">
                        <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
                        <option value="2027">2027</option><option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option>
                    </select>
                    <button id="btn-ytd" onclick="setFilterMode('ytd')" class="px-2 py-1 rounded-md transition-all font-bold uppercase text-[9px] hover:bg-white/10">YTD</button>
                </div>

                <button onclick="openModal()" class="bg-white text-emerald-600 px-4 py-1.5 rounded-lg font-black shadow-lg hover:scale-105 active:scale-95 transition-all border-b-2 border-emerald-200 uppercase">➕ RECORD</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-3 space-y-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass-card p-3 rounded-xl border-l-4 border-emerald-500 text-center">
                <p class="text-slate-400 font-bold uppercase text-[9px]">Total Scrap</p>
                <h2 id="stat-total-qty" class="text-2xl font-black text-slate-800 tracking-tight">0</h2>
            </div>
            <div class="glass-card p-3 rounded-xl border-l-4 border-slate-300 text-center">
                <p class="text-slate-400 font-bold text-[9px] uppercase italic">งานหล่น ใต้เครื่อง</p>
                <h2 id="val-source-1" class="text-xl font-bold">0</h2>
            </div>
            <div class="glass-card p-3 rounded-xl border-l-4 border-slate-300 text-center">
                <p class="text-slate-400 font-bold text-[9px] uppercase italic">งาน Reject จากเครื่อง</p>
                <h2 id="val-source-2" class="text-xl font-bold">0</h2>
            </div>
            <div class="glass-card p-3 rounded-xl border-l-4 border-slate-300 text-center">
                <p class="text-slate-400 font-bold text-[9px] uppercase italic">งานใน Yellow Box</p>
                <h2 id="val-source-3" class="text-xl font-bold">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="lg:col-span-1 space-y-2">
                <div class="flex justify-between items-center px-1 text-slate-400 font-black uppercase italic tracking-tighter">
                    <span>📋 Recent Logs</span>
                    <button onclick="exportToExcel('logs')" class="text-emerald-600 hover:underline">Export</button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-[850px]">
                    <div class="overflow-y-auto h-full">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 sticky top-0 z-10 text-[9px] border-b uppercase">
                                <tr><th class="p-2">Staff/Time</th><th class="p-2">Model/Defect</th><th class="p-2 text-right">Qty</th><th class="p-2"></th></tr>
                            </thead>
                            <tbody id="logs-tbody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 overflow-hidden">
                    <h3 class="text-[10px] font-black text-emerald-600 uppercase tracking-widest italic mb-3">Pareto: Defect Breakdown</h3>
                    <!-- เพิ่ม overflow-x-auto เพื่อให้เห็น Scrollbar ถ้ากราฟยาว -->
                    <div class="overflow-y-auto max-h-[850px]">
                        <div class="chart-container"><canvas id="defectChart"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[10px] font-black text-emerald-600 uppercase tracking-widest italic">BOM Explosion Analysis</h3>
                        <button onclick="exportToExcel('bom')" class="bg-schneider text-white px-4 py-1.5 rounded-lg font-black shadow hover:bg-emerald-600 transition-all text-[9px] uppercase tracking-tighter">
                            📥 Export BOM Explode
                        </button>
                    </div>
                    <div class="overflow-y-auto max-h-[850px]">
                        <div class="chart-container"><canvas id="bomChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- RECORD & EDIT MODAL -->
    <div id="recordModal" class="modal hide">
        <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-2xl space-y-4 m-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 id="modal-title" class="text-base font-black text-emerald-700 uppercase tracking-tighter italic">New Scrap Record</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500 text-2xl font-bold">&times;</button>
            </div>
            <form id="scrapForm" class="space-y-3 text-[12px]">
                <input type="hidden" id="in-id">
                <div><label class="block font-bold text-slate-500 mb-1 italic">Staff Name</label><input type="text" id="in-staff" required placeholder="ชื่อพนักงาน" class="w-full p-2 border rounded-lg bg-slate-50 focus:ring-2 ring-emerald-500 outline-none"></div>
                <div>
                    <label class="block font-bold text-slate-500 mb-1 italic">Source</label>
                    <select id="in-source" class="w-full p-2 border rounded-lg bg-slate-50">
                        <option value="งานหล่น ใต้เครื่อง">งานหล่น ใต้เครื่อง</option>
                        <option value="งาน Reject จากเครื่อง">งาน Reject จากเครื่อง</option>
                        <option value="งานใน Yellow Box">งานใน Yellow Box</option>
                    </select>
                </div>
                <div><label class="block font-bold text-slate-500 mb-1 italic">Model</label><select id="in-model" class="w-full p-2 border rounded-lg bg-slate-50"></select></div>
                <div><label class="block font-bold text-slate-500 mb-1 italic">Defect Symptoms</label><select id="in-defect" class="w-full p-2 border rounded-lg bg-slate-50"></select></div>
                <div><label class="block font-bold text-slate-500 mb-1 italic">Qty (ชิ้น)</label><input type="number" id="in-qty" value="1" min="1" required class="w-full p-2 border rounded-lg bg-slate-50"></div>
                <button type="submit" id="saveBtn" class="w-full bg-schneider text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-600 transition-all mt-4 uppercase tracking-wider">Save Data</button>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyymdZFOLv1nLcNV0d1mkHvbHQbSFXqUS_Ef3fMxlYnL8vRjqsPnaQG7o3r8VNA7kfY/exec';
        const MODEL_TO_PART = { "Domae 16A 1P": "GHM10369B-BOI", "Easy9 16A 1P": "GHM10369BVF-BOI", "IK60 16A 1P": "GHM10369B-BOI(CN)", "IK60 16A 3/4P - IK20A 1/2P": "GHM10369C-BOI(CN)", "Domae Easy9 16A 3/4P - IK20A 1/2P": "GHM10740A-BOI" };
        
        let rawData = { logs: [], matrix: [], master: [] }, filteredLogs = [], charts = { defect: null, bom: null }, currentMode = 'current';
        let isFirstLoad = true;

        function wrapText(text, maxLength = 25) {
            if (!text) return [""];
            const words = text.toString().split(" ");
            let lines = [], currentLine = "";
            words.forEach(word => {
                if ((currentLine + word).length > maxLength) {
                    if (currentLine) lines.push(currentLine.trim());
                    currentLine = word + " ";
                } else currentLine += word + " ";
            });
            lines.push(currentLine.trim());
            return lines;
        }

        async function fetchAllData() {
            if (isFirstLoad) document.getElementById('loading').classList.remove('hide');
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                rawData = await response.json();
                updateDropdowns();
                processShiftData();
                renderAll();
            } catch (err) { showToast("Connection Error!", "#ef4444"); }
            finally { document.getElementById('loading').classList.add('hide'); isFirstLoad = false; }
        }

        function parseSheetDate(dateStr) {
            if (!dateStr || dateStr === "Timestamp") return new Date(0);
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) return d;
            try {
                const parts = dateStr.toString().split(/[\/\s,:-]+/);
                if (parts.length >= 3) {
                    if (parts[0].length === 4) return new Date(parts[0], parts[1]-1, parts[2], parts[3]||0, parts[4]||0, parts[5]||0);
                    else return new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0, parts[5]||0);
                }
            } catch(e) {}
            return new Date(0);
        }

        function updateDropdowns() {
            const mSelect = document.getElementById('in-model'), dSelect = document.getElementById('in-defect');
            if (rawData.master.length > 0) mSelect.innerHTML = rawData.master.slice(1).map(r => r[0]).filter(v => v && v !== 'Common').map(m => `<option value="${m}">${m}</option>`).join('');
            if (rawData.matrix.length > 0) dSelect.innerHTML = rawData.matrix.slice(1).map(r => r[0]).filter(v => v).map(d => `<option value="${d}">${d}</option>`).join('');
            if (isFirstLoad) {
                const now = new Date();
                document.getElementById('sel-month').value = now.getMonth();
                document.getElementById('sel-year').value = now.getFullYear();
            }
        }

        function processShiftData() {
            const now = new Date(), hr = now.getHours();
            const sm = parseInt(document.getElementById('sel-month').value), sy = parseInt(document.getElementById('sel-year').value);
            let start, end, label;

            if (currentMode === 'current' || currentMode === 'previous') {
                let cs = new Date(now);
                if (hr >= 8 && hr < 20) cs.setHours(8,0,0,0);
                else { if (hr < 8) cs.setDate(cs.getDate() - 1); cs.setHours(20,0,0,0); }
                if (currentMode === 'current') { start = new Date(cs); end = new Date(cs.getTime() + 12*3600000); label = "🕒 Shift (" + (start.getHours() === 8 ? "08:00-20:00" : "20:00-08:00") + ")"; }
                else { end = new Date(cs); start = new Date(cs.getTime() - 12*3600000); label = "⏮️ Prev Shift (" + (start.getHours() === 8 ? "08:00-20:00" : "20:00-08:00") + ")"; }
            } else if (currentMode === 'month') { start = new Date(sy, sm, 1); end = new Date(sy, sm + 1, 1); label = `📅 Month: ${start.toLocaleString('en-US', { month: 'short' })} ${sy}`; }
            else { start = new Date(sy, 0, 1); end = (currentMode === 'ytd' && sy === now.getFullYear()) ? now : new Date(sy + 1, 0, 1); label = currentMode === 'ytd' ? `📈 YTD ${sy}` : `📊 Annual ${sy}`; }

            document.getElementById('shift-label').innerText = label;
            filteredLogs = rawData.logs.slice(1).filter(l => { const t = parseSheetDate(l[1]); return t >= start && t < end; });
        }

        function renderAll() {
            const total = filteredLogs.reduce((a, c) => a + (parseInt(c[6]) || 0), 0);
            document.getElementById('stat-total-qty').innerText = total.toLocaleString();
            const getQty = (sn) => filteredLogs.filter(l => sn.includes(l[3])).reduce((a, c) => a + (parseInt(c[6]) || 0), 0);
            document.getElementById('val-source-1').innerText = getQty(["งานหล่น ใต้เครื่อง", "งานตกใต้เครื่อง"]).toLocaleString();
            document.getElementById('val-source-2').innerText = getQty(["งาน Reject จากเครื่อง", "Reject เครื่อง"]).toLocaleString();
            document.getElementById('val-source-3').innerText = getQty(["งานใน Yellow Box", "กล่องเหลือง"]).toLocaleString();
            
            document.getElementById('logs-tbody').innerHTML = [...filteredLogs].reverse().map(l => `
                <tr class="hover:bg-slate-50 border-b border-slate-50">
                    <td class="p-2 font-bold text-slate-700">${l[2]}<div class="text-[8px] text-slate-400 font-mono">${parseSheetDate(l[1]).toLocaleString('th-TH', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</div></td>
                    <td class="p-2 font-bold text-emerald-700"><div>${l[4]}</div><div class="text-[9px] text-slate-500 font-normal">${l[5]}</div></td>
                    <td class="p-2 text-right font-black text-rose-500 text-sm">${(parseInt(l[6]) || 0).toLocaleString()}</td>
                    <td class="p-2 text-right"><button onclick="editEntry('${l[0]}')" class="text-slate-300 hover:text-sky-500 transition-colors p-1">✏️</button></td>
                </tr>`).join('');
            renderCharts();
        }

        function renderCharts() {
            const dMap = {}; filteredLogs.forEach(l => { dMap[l[5]] = (dMap[l[5]] || 0) + (parseInt(l[6]) || 0); });
            const ds = Object.entries(dMap).sort((a,b) => b[1]-a[1]);
            
            // --- DYNAMIC HEIGHT CALCULATION ---
            // เราคำนวณความสูงตามจำนวนรายการ: ล็อคไว้ที่รายการละ 45px (หรือขั้นต่ำ 400px)
            const dynamicHeightD = Math.max(400, ds.length * 50);
            const ctxD = document.getElementById('defectChart');
            ctxD.parentNode.style.height = dynamicHeightD + "px";

            if (charts.defect) charts.defect.destroy();
            charts.defect = new Chart(ctxD.getContext('2d'), { 
                type: 'bar', 
                data: { labels: ds.map(d => wrapText(d[0], 30)), datasets: [{ data: ds.map(d => d[1]), backgroundColor: '#f43f5e', borderRadius: 4 }] }, 
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                    layout: { padding: { right: 50, left: 10 } }, 
                    plugins: { legend: { display: false }, datalabels: { align: 'end', anchor: 'end', color: '#000', font: { weight: 'bold', size: 10 }, formatter: (v) => v.toLocaleString() } }, 
                    scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false, padding: 10 } } } 
                } 
            });

            const bMap = {}; const mH = rawData.matrix[0], mR = rawData.matrix.slice(1); if(mH) mH.slice(1).forEach(p => bMap[p.trim()] = 0);
            filteredLogs.forEach(l => {
                const u = MODEL_TO_PART[l[4]], row = mR.find(r => r[0] === l[5]);
                if (row) mH.slice(1).forEach((p, i) => { const cp = p.trim(); if (parseInt(row[i+1]) > 0) { if (Object.values(MODEL_TO_PART).includes(cp)) { if (cp === u) bMap[cp] += parseInt(l[6]); } else bMap[cp] += parseInt(l[6]); } });
            });
            const bl = Object.keys(bMap).filter(k => bMap[k] > 0);
            
            const dynamicHeightB = Math.max(400, bl.length * 45);
            const ctxB = document.getElementById('bomChart');
            ctxB.parentNode.style.height = dynamicHeightB + "px";

            if (charts.bom) charts.bom.destroy();
            charts.bom = new Chart(ctxB.getContext('2d'), { 
                type: 'bar', 
                data: { labels: bl.map(l => wrapText(l, 30)), datasets: [{ data: bl.map(l => bMap[l]), backgroundColor: bl.map(l => l.includes('GHM') ? '#3dcd58' : '#94a3b8'), borderRadius: 4 }] }, 
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                    layout: { padding: { right: 50, left: 10 } }, 
                    plugins: { legend: { display: false }, datalabels: { align: 'end', anchor: 'end', color: '#000', font: { weight: 'bold', size: 10 }, formatter: (v) => v.toLocaleString() } }, 
                    scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } } } 
                } 
            });
        }

        function openModal() { document.getElementById('recordModal').classList.remove('hide'); document.getElementById('scrapForm').reset(); document.getElementById('in-id').value = ""; document.getElementById('modal-title').innerText = "New Scrap Record"; }
        function closeModal() { document.getElementById('recordModal').classList.add('hide'); }
        function editEntry(id) {
            const e = rawData.logs.find(l => l[0] === id);
            if (!e) return;
            openModal();
            document.getElementById('modal-title').innerText = "Edit Record";
            document.getElementById('in-id').value = e[0]; document.getElementById('in-staff').value = e[2]; document.getElementById('in-source').value = e[3]; document.getElementById('in-model').value = e[4]; document.getElementById('in-defect').value = e[5]; document.getElementById('in-qty').value = e[6];
        }
        document.getElementById('scrapForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "PROCESSING...";
            const id = document.getElementById('in-id').value;
            const p = { action: id ? 'edit' : 'create', id, staff: document.getElementById('in-staff').value, source: document.getElementById('in-source').value, model: document.getElementById('in-model').value, defect: document.getElementById('in-defect').value, qty: document.getElementById('in-qty').value };
            try { await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) }); showToast("Success!", "#3dcd58"); closeModal(); fetchAllData(); }
            catch (err) { showToast("Failed!", "#ef4444"); }
            finally { btn.disabled = false; btn.innerText = "SAVE DATA"; }
        });
        function showToast(m, c) { const t = document.getElementById('toast'); t.innerText = m; t.style.backgroundColor = c; t.classList.remove('hide'); setTimeout(() => t.classList.add('hide'), 3000); }
        function exportToExcel(t) {
            if (filteredLogs.length === 0) return showToast("No Data!", "#6b7280");
            let csv = "\ufeff";
            if (t === 'logs') { csv += "ID,Time,Staff,Source,Model,Defect,Qty\n"; filteredLogs.forEach(l => csv += `${l[0]},${l[1]},${l[2]},${l[3]},${l[4]},"${l[5]}",${l[6]}\n`); }
            else { csv += "Part Number,Total Explosion Qty\n"; const bm = calculateCurrentBOM(); Object.keys(bm).forEach(p => { if (bm[p] > 0) csv += `${p},${bm[p]}\n`; }); }
            const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = `${t}_${currentMode}_report.csv`; l.click();
        }
        function calculateCurrentBOM() {
            const bMap = {}; const mH = rawData.matrix[0], mR = rawData.matrix.slice(1); if(mH) mH.slice(1).forEach(p => bMap[p.trim()] = 0);
            filteredLogs.forEach(l => { const u = MODEL_TO_PART[l[4]], row = mR.find(r => r[0] === l[5]); if (row) mH.slice(1).forEach((p, i) => { const cp = p.trim(); if (parseInt(row[i+1]) > 0) { if (Object.values(MODEL_TO_PART).includes(cp)) { if (cp === u) bMap[cp] += parseInt(l[6]); } else bMap[cp] += parseInt(l[6]); } }); });
            return bMap;
        }
        function setFilterMode(m) { currentMode = m; ['btn-current', 'btn-previous', 'btn-ytd'].forEach(id => document.getElementById(id).classList.toggle('btn-active', id === 'btn-' + m)); processShiftData(); renderAll(); }
        window.onload = () => { Chart.register(ChartDataLabels); fetchAllData(); };
        setInterval(fetchAllData, 300000);
    </script>
</body>
</html>
